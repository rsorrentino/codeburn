name: firstlook
on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  assess:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: getagentseal/firstlook@main
        with:
          skip-users: 'dependabot[bot],renovate[bot]'
          fail-on: 'unknown'
